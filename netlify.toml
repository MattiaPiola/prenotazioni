[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  port = 3000
  functions = "netlify/functions"

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/logout"
  to = "/.netlify/functions/admin-logout"
  status = 200

[[redirects]]
  from = "/api/admin/me"
  to = "/.netlify/functions/admin-me"
  status = 200

[[redirects]]
  from = "/api/admin/admin-users/*/rooms"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/admin-users/*"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/admin-users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/rooms/*/duplicate"
  to = "/.netlify/functions/admin-rooms"
  status = 200

[[redirects]]
  from = "/api/admin/rooms/*/slots/*"
  to = "/.netlify/functions/admin-slots"
  status = 200

[[redirects]]
  from = "/api/admin/rooms/*/slots"
  to = "/.netlify/functions/admin-slots"
  status = 200

[[redirects]]
  from = "/api/admin/rooms/*"
  to = "/.netlify/functions/admin-rooms"
  status = 200

[[redirects]]
  from = "/api/admin/rooms"
  to = "/.netlify/functions/admin-rooms"
  status = 200

[[redirects]]
  from = "/api/admin/recurring-requests/*"
  to = "/.netlify/functions/admin-recurring"
  status = 200

[[redirects]]
  from = "/api/admin/recurring-requests"
  to = "/.netlify/functions/admin-recurring"
  status = 200

[[redirects]]
  from = "/api/admin/bookings/*"
  to = "/.netlify/functions/admin-bookings"
  status = 200

[[redirects]]
  from = "/api/admin/bookings"
  to = "/.netlify/functions/admin-bookings"
  status = 200

[[redirects]]
  from = "/api/admin/blocked-slots/*"
  to = "/.netlify/functions/admin-blocked-slots"
  status = 200

[[redirects]]
  from = "/api/admin/blocked-slots"
  to = "/.netlify/functions/admin-blocked-slots"
  status = 200

[[redirects]]
  from = "/api/rooms/*/blocked-slots"
  to = "/.netlify/functions/room-blocked-slots"
  status = 200

[[redirects]]
  from = "/api/rooms/*/slots"
  to = "/.netlify/functions/room-slots"
  status = 200

[[redirects]]
  from = "/api/rooms/*/bookings"
  to = "/.netlify/functions/room-bookings"
  status = 200

[[redirects]]
  from = "/api/rooms"
  to = "/.netlify/functions/rooms"
  status = 200

[[redirects]]
  from = "/api/bookings/*"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/recurring-requests"
  to = "/.netlify/functions/recurring-requests"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
